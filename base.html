<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Playlist Manager{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <a class="brand" href="{{ url_for('index') }}">
        <span class="logo">🎵</span>
        <span>
          Playlist Manager
          <span class="subtitle">Exportify → Nuclear</span>
        </span>
      </a>
      <nav class="nav">
        <a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">Playlists</a>
        <a href="{{ url_for('merge_page') }}" class="{% if request.endpoint == 'merge_page' %}active{% endif %}">Combinar</a>
        <a href="{{ url_for('backups_page') }}" class="{% if request.endpoint == 'backups_page' %}active{% endif %}">Respaldos</a>
      </nav>
    </header>
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>
  <div class="toast-container" id="toast-container"></div>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
